name: Sanitizers

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  asan-ubsan:
    name: Linux / ASan + UBSan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build-sanitize -G Ninja
          -DBUILD_TESTING=ON
          -DDSP_BUILD_DEMOS=ON
          -DDSP_BUILD_BENCHMARKS=OFF
          -DDSP_ENABLE_AVX2=OFF
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build-sanitize --config Debug --parallel

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build-sanitize -C Debug --output-on-failure
