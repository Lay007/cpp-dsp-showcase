name: CMake CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.avx2 && 'avx2' || 'baseline' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            avx2: true
          - os: windows-latest
            avx2: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        if: runner.os == 'Linux'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        if: runner.os == 'Linux'
        run: python -m pip install numpy matplotlib

      - name: Configure
        run: >
          cmake -S . -B build
          -DBUILD_TESTING=ON
          -DDSP_BUILD_DEMOS=ON
          -DDSP_BUILD_BENCHMARKS=ON
          -DDSP_ENABLE_AVX2=${{ matrix.avx2 && 'ON' || 'OFF' }}
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Install package
        run: cmake --install build --config Release --prefix install

      - name: Configure installed package consumer
        run: >
          cmake -S examples/install_consumer -B build-install-consumer
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install
          -DCMAKE_BUILD_TYPE=Release

      - name: Build installed package consumer
        run: cmake --build build-install-consumer --config Release --parallel

      - name: Run installed package consumer
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build-install-consumer/Release/install_consumer.exe
          else
            ./build-install-consumer/install_consumer
          fi
        shell: bash

      - name: Generate benchmark report
        if: runner.os == 'Linux'
        run: cmake --build build --config Release --target benchmark_report

      - name: Generate DSP SVG artifacts
        if: runner.os == 'Linux'
        run: python tools/generate_dsp_svg_artifacts.py

      - name: Generate benchmark dashboard assets
        if: runner.os == 'Linux'
        run: python tools/generate_benchmark_plot.py

      - name: Upload generated DSP artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: dsp-generated-assets
          path: |
            build/reports/dsp_performance.md
            docs/assets/fir_response.svg
            docs/assets/goertzel_detection.svg
            docs/assets/gcc_phat_delay.svg
            docs/assets/benchmark_dashboard.svg
            docs/assets/benchmark_results.png
